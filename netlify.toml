[build]
  base = "frontend"
  package = "frontend"
  command = "npm ci && npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "22"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  region = "us-east-2"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200